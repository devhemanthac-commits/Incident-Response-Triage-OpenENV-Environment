version: '3.8'

services:
  incident-triage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: incident-triage
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      PYTHONUNBUFFERED: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
